name: CI microservicios

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write
jobs:
  build-test-run:

    runs-on: ubuntu-latest
    services:
      producto-db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: productodb
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U $$POSTGRES_USER"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      orden-db:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ordendb
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U $$POSTGRES_USER"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    # ========================
    # Seguridad sobre el código (SAST + Dependency)
    # ========================
    - name: Instalando Snyk CLI
      run: npm install -g snyk
    - name: Escaneo de dependencias Snyk
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk test --all-projects --severity-threshold=critical
    - name: Trivy Filesystem Scan (SAST + config)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        ignore-unfixed: true
        severity: 'HIGH,CRITICAL'
    - name: Compilar modulos sin tests
      run: mvn -B -pl producto-service,orden-service -am clean package -DskipTests
    # ===================================
    # Hardening: OPA/Conftest sobre Dockerfiles
    # ===================================
    - name: Instalar Conftest
      run: |
        curl -L https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz \
        | tar zx
        sudo mv conftest /usr/local/bin/
        conftest --version
    - name: Validando politicas
      run: |
        conftest verify --policy policy
    - name: Debug Dockerfile parser output
      run: |
        echo "=== producto-service parsed ==="
        conftest parse --parser dockerfile producto-service/Dockerfile
        echo "=== orden-service parsed ==="
        conftest parse --parser dockerfile orden-service/Dockerfile
    - name: Verificación de políticas de seguridad (Dockerfile)
      run: |
        conftest test --parser dockerfile producto-service/Dockerfile --output json || true
        conftest test --parser dockerfile orden-service/Dockerfile --output json || true
    # __________________________
    # SBOM (Software Bill of Materials)
    # __________________________
    - name: SBOM producto-service (CycloneDX)
      uses: anchore/sbom-action@v0
      with:
        path: producto-service
        format: cyclonedx-json
        output-file: productosbom.json
        upload-artifact: true
    - name: Escaneo Snyk SBOM producto-service
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk sbom test --experimental --file=productosbom.json -d || true
    - name: SBOM orden-service (CycloneDX)
      uses: anchore/sbom-action@v0
      with:
        path: orden-service
        format: cyclonedx-json
        output-file: ordensbom.json
        upload-artifact: true
    - name: Escaneo Snyk SBOM orden-service
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk sbom test --experimental --file=ordensbom.json -d || true
    # _________________________________________________
    # Integrando SBOM con Trivy y reportandolo como SARIF
    # _________________________________________________
    - name: Generar SBOM compatible Trivy (CycloneDX)
      run: trivy fs . --format cyclonedx --output productosbom1.json
    - name: Trivy SBOM -> SARIF
      run: trivy sbom productosbom1.json --format sarif --output trivy-sbom-1.sarif
    - name: Subiendo el SARIF a GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-sbom-1.sarif
        category: producto-service
    - name: Generar SBOM compatible Trivy (CycloneDX)
      run: trivy fs . --format cyclonedx --output ordensbom2.json
    - name: Trivy SBOM -> SARIF
      run: trivy sbom ordensbom2.json --format sarif --output trivy-sbom-2.sarif
    - name: Subiendo el SARIF a GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-sbom-2.sarif
        category: orden-service
    - name: Subiendo artifact SARIF
      uses: actions/upload-artifact@v4
      with:
        name: sarif-files
        path: "*.sarif"
    # __________________________
    # Levantar producto-service
    # __________________________
    - name: Iniciar producto-service
      env:
        SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        cd producto-service
        nohup java -jar target/*.jar \
          --server.port=8081 \
          --spring.datasource.url=jdbc:postgresql://localhost:5433/productodb \
          > ../logs_producto/producto-service.log 2>&1 &
    # __________________________
    # Levantar orden-service (dependiente)
    # __________________________
    - name: Iniciar orden-service
      env:
        SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        cd orden-service
        nohup java -jar target/*.jar \
          --server.port=8082 \
          --spring.datasource.url=jdbc:postgresql://localhost:5434/ordendb \
          > ../logs_orden/orden-service.log 2>&1 &

    - name: Esperar hasta que los servicios estén listos
      run: sleep 25
    - name: Ejecutando tests de integración (multi módulo)
      env:
        PRODUCT_SERVICE_URL: http://localhost:8081
        ORDERS_SERVICE_URL: http://localhost:8082
      run: mvn -B test -pl producto-service,orden-service -am
