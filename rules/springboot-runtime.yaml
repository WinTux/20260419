#macro para identificar contenedores (no host)
- macro: container
  condition: container.id != host
# Listar los processos permitidos
- list: springboot_procesos_permitidos
  items:
    - java
    - java.exe
    - java.bin
    - /usr/bin/java
# Regla 1: Detectar shell interactiva dentro del contenedor
- rule: Shell_Dentro_Contenedor
  desc: Detecta la ejecución de sh/bash dentro de un contenedor con SpringBoot.
  condition: >
    spawned_process and container and proc.name in (bash, sh, ash, zsh)
  output: >
    Shell detectada dentro del contenedor (proc=%proc.name user=%user.name container=%container.id image=%container.image)
  priority: CRITICAL
  tags: [container, process, security]
# Regla 2: Ejecución sospechosa de comandos
- rule: Procesos_Sospechosos_En_Conteneodr_SpringBoot
  desc: Ddetecta la ejecución de herramientas que normalmente no están en un  runtime java.
  condition: >
    spawned_process and container and proc.name (curl, wget, nc, netcat, socat, tcpdump, nmap, bash, sh, ssh)
  output: >
    Proceso sospechoso ejecutado en contenedor (proc=%proc.name args=%proc.args container=%container.id image=%container.image)
  priority: WARNING
  tags: [container, attack, runtime]
# Regla 3: Modificación de /etc dentro del container
- rule: Modif_escritura_en_etc_de_contenedor
  desc: Detecta intentos de escribir en /etc/* desde contenedor de Spring Boot.
  condition: >
    container and (evt.type in (open, openat, creat, openat2)) and
    fd.name startswith "/etc" and
    evt.arg.flags contains O_WRONLY
  output: >
    Esritura en /etc dentro del contenedor (archivo=%fd.name user=%user.name proc=%proc.name container=%container.id)
  priority: ERROR
  tags: [container, filesystem, escalado_privilegios]
# Regla 4: Acceso al socket de Docker (posible escape)
- rule: Aceso_Socket_Docker_En_Contenedor
  desc: El acceso a docker.sock puede indicar un intento de escape del contenedor.
  condition: >
    container and fd.name = "/var/run/docker.sock" and
    (evt.type in (open, openat, openat2))
  output: >
    Contenedor accediendo a docker.sock (proc=%proc.name user=%user.name container=%container.id)
  priority: CRITICAL
  tags: [escape, escalado_privilegios, container]
# Regla 5: Acceso a archivos sensibles
- rule: Lectura_De_Archivos_Sensibles_En_Contenedor
  desc: Detecta la lectura de secretos o claves provadas dentro del contenedor.
  condition: >
    container and (evt.type in (open, openat, openat2)) and
    fd.name in ("/etc/passwd", "/etc/shadow", "/root/.ssh/id_rsa", "/run/secrets", "/var/run/secrets/kubernetes.io/serviceaccount/token")
  output: >
    Lectura de archivo sensible dentro del contenedor (archivo=%fd.name user=%user.name proc=%proc.name container=%container.id)
  priority: WARNING
  tags: [filesystem, container, secrets]
# Regla 6: Procesos hijos inesperados desde Java/Spring Boot
- rule: Java_Generando_Procesos_Inesperados
  desc: Las aplicaciones Spring Boot normalmente no generan subprocesos inesperados del sistema operativo
  condition: >
    container and
    (evt.type in (execve, execveat)) and
    proc.pname in (springboot_procesos_permitidos) and
    not proc.name in (springboot_procesos_permitidos)
  output: >
    Sospechoso! Java generó u proceso hijo (padre=%proc.pname hijo=%proc.name args=%proc.args container=%container.id)
  priority: NOTICE
  tags: [sospechoso, runtime, springboot]
